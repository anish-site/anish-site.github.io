  <main class="wrap">
    <div class="detail-head">
      <a class="crumb" href="index.html">← Back to home</a>

        <div class="d-ico" id="d-ico"></div>

  <script src="config.js"></script>
  <script src="data.js"></script>
  <script src="blog.js"></script>
  <script>
    (function (global) {
      var S = PORTFOLIO.sections;
      var order = PORTFOLIO.order;

      // ---- pick section from URL ----
      var params = new URLSearchParams(window.location.search);
      var key = params.get('s');
      if (!key || !S[key]) key = order[0];
      var sec = S[key];

      document.title = 'Anish J — ' + sec.label;

      // ---- tiny inline formatter: **bold**, *italic* ----
      function fmt(t) {
        return t
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
          .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
          .replace(/\*(.+?)\*/g, '<em>$1</em>');
      }

      // ---- header ----
      document.getElementById('d-ico').innerHTML = sec.icon;
      document.getElementById('d-title').textContent = sec.label;
      document.getElementById('d-tagline').textContent = sec.tagline;
      document.getElementById('year').textContent = new Date().getFullYear();

      // ---- section pills ----
      document.getElementById('section-nav').innerHTML = order.map(function (k) {
        var s = S[k];
        var cls = (k === key) ? 'pill active' : 'pill';
        return '<a class="' + cls + '" href="detail.html?s=' + k + '">' + s.icon + s.label + '</a>';
      }).join('');

      // ---- block renderers ----
      function renderBlock(b) {
        switch (b.type) {
          case 'lead':
            return '<div class="blk"><p class="blk-lead">' + fmt(b.text) + '</p></div>';
          case 'heading':
            return '<div class="blk"><h2 class="blk-heading">' + fmt(b.text) + '</h2></div>';
          case 'para':
            return '<div class="blk"><p class="blk-para">' + fmt(b.text) + '</p></div>';
          case 'list':
            return '<div class="blk"><ul class="blk-list">' +
              b.items.map(function (i) { return '<li>' + fmt(i) + '</li>'; }).join('') + '</ul></div>';
          case 'timeline':
            return '<div class="blk"><div class="tl">' + b.entries.map(function (e) {
              return '<div class="tl-item"><div class="tl-card">' +
                '<div class="tl-top"><div><h3>' + fmt(e.title) + '</h3>' +
                '<div class="tl-org">' + fmt(e.org) + '</div></div>' +
                '<div class="tl-when">' + fmt(e.when) + '</div></div>' +
                '<div class="tl-place">' + fmt(e.place) + '</div>' +
                '<ul>' + e.points.map(function (p) { return '<li>' + fmt(p) + '</li>'; }).join('') + '</ul>' +
                '</div></div>';
            }).join('') + '</div></div>';
          case 'tags':
            return '<div class="blk"><div class="tag-groups">' + b.groups.map(function (g) {
              return '<div class="tag-group"><h4><span class="gdot"></span>' + fmt(g.label) + '</h4>' +
                '<div class="chips">' + g.items.map(function (i) { return '<span class="chip">' + fmt(i) + '</span>'; }).join('') +
                '</div></div>';
            }).join('') + '</div></div>';
          case 'cards':
            return '<div class="blk"><div class="cards">' + b.items.map(function (c) {
              var ext = c.link && /^https?:/i.test(c.link);
              var inner = '<h3>' + fmt(c.title) + '</h3>' +
                (c.meta ? '<p class="c-meta">' + fmt(c.meta) + '</p>' : '') +
                '<p class="c-text">' + fmt(c.text) + '</p>' +
                (c.link ? '<span class="c-link">' + (c.linkText || (ext ? 'Open app ↗' : 'Read →')) + '</span>' : '');
              if (ext) return '<a class="c-card c-card-link" href="' + c.link + '" target="_blank" rel="noopener">' + inner + '</a>';
              return '<div class="c-card">' + inner + '</div>';
            }).join('') + '</div></div>';
          case 'note':
            return '<div class="blk"><div class="note"><span class="note-i">✎</span><span>' + fmt(b.text) + '</span></div></div>';
          default:
            return '';
        }
      }

      document.getElementById('detail-body').innerHTML = sec.blocks.map(renderBlock).join('');

      // ---- Blog: load live posts from /posts Markdown (falls back to samples) ----
      function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
      if (key === 'blog' && global.BlogSource) {
        var cardsEl = document.querySelector('#detail-body .cards');
        if (cardsEl) {
          cardsEl.insertAdjacentHTML('beforebegin',
            '<p class="blk-para" id="blog-loading" style="opacity:.7">Loading latest posts…</p>');
        }
        global.BlogSource.fetchBlogs().then(function (posts) {
          var loading = document.getElementById('blog-loading');
          if (loading) loading.remove();
          if (!posts || !posts.length) return; // keep built-in samples

          var html = posts.map(function (p) {
            var meta = [p.category, p.date].filter(Boolean).join(' · ');
            return '<a class="c-card c-card-link" data-category="' + esc(p.category || '') + '" href="post.html?p=' + encodeURIComponent(p.slug) + '">' +
              '<h3>' + fmt(p.title) + '</h3>' +
              (meta ? '<p class="c-meta">' + fmt(meta) + '</p>' : '') +
              '<p class="c-text">' + fmt(p.summary) + '</p>' +
              '<span class="c-link">Read →</span></a>';
          }).join('');
          var container = document.querySelector('#detail-body .cards');
          if (!container) return;
          container.innerHTML = html;

          // category filter chips (only when there's more than one category)
          var cats = {};
          posts.forEach(function (p) { var c = (p.category || '').trim(); if (c) cats[c] = (cats[c] || 0) + 1; });
          var catNames = Object.keys(cats);
          if (catNames.length > 1) {
            var chips = '<button class="filter-chip active" data-cat="*">All <span class="fc-count">' + posts.length + '</span></button>' +
              catNames.map(function (c) {
                return '<button class="filter-chip" data-cat="' + esc(c) + '">' + esc(c) + ' <span class="fc-count">' + cats[c] + '</span></button>';
              }).join('');
            container.insertAdjacentHTML('beforebegin', '<div class="blog-filter" id="blog-filter">' + chips + '</div>');
            document.getElementById('blog-filter').addEventListener('click', function (e) {
              var btn = e.target.closest('.filter-chip'); if (!btn) return;
              var cat = btn.getAttribute('data-cat');
              this.querySelectorAll('.filter-chip').forEach(function (b) { b.classList.toggle('active', b === btn); });
              container.querySelectorAll('.c-card').forEach(function (card) {
                var show = (cat === '*') || (card.getAttribute('data-category') === cat);
                card.classList.toggle('is-hidden', !show);
              });
            });
          }
        });
      }
    })(window);
  </script>
  <script src="theme.js"></script>
</body>
