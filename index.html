<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anish J — Portfolio</title>
  <meta name="description" content="Anish J — Product & Operations Leader, MBA candidate. Bio, résumé, education, jobs, projects and thoughts.">
  <link rel="icon" type="image/png" href="loading-bar.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="alternate" type="application/rss+xml" title="Anish J — Thoughts" href="feed.xml">
  <script>(function(){try{var t=localStorage.getItem('theme');if(!t){t=(window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches)?'light':'dark';}if(t==='light')document.documentElement.setAttribute('data-theme','light');}catch(e){}})();</script>
</head>
<body class="home">

  <!-- Top bar with hover-preview tabs -->
  <header class="topbar">
    <div class="wrap topbar-inner">
      <a class="brand" href="index.html">Anish<span class="dot">.</span>J</a>
      <nav class="tabs" id="tabs"><!-- rendered by JS --></nav>
      <div class="topbar-cta">
        <button class="theme-toggle" type="button" aria-label="Toggle theme">
          <span class="ic-moon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg></span>
          <span class="ic-sun"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5.6 5.6 4.2 4.2M19.8 19.8l-1.4-1.4M18.4 5.6l1.4-1.4M4.2 19.8l1.4-1.4"/></svg></span>
        </button>
        <a class="btn btn-ghost btn-sm linkedin-btn" href="https://www.linkedin.com/in/anish-j-" target="_blank" rel="noopener">LinkedIn</a>
        <a class="btn btn-primary btn-sm" href="mailto:anishjoson@gmail.com">Contact</a>
      </div>
    </div>
  </header>

  <!-- Single-view stage -->
  <main class="stage">
    <div class="wrap stage-grid">

      <!-- Identity -->
      <section class="identity">
        <span class="eyebrow"><span class="pulse"></span> <span id="status"></span></span>
        <h1>Hi, I'm <span class="grad" id="firstname"></span></h1>
        <p class="role" id="role"></p>
        <p class="tagline" id="tagline"></p>
        <div class="meta">
          <span>📍 <span id="location"></span></span>
          <span>✉ <a id="emaillink" href="#"></a></span>
        </div>
        <div class="actions">
          <a class="btn btn-primary" href="detail.html?s=bio">Explore portfolio →</a>
          <a class="btn btn-ghost" href="detail.html?s=resume">View résumé</a>
        </div>
      </section>

      <!-- Bento grid of tiles -->
      <section class="bento" id="bento" aria-label="Portfolio sections"><!-- rendered by JS --></section>

    </div>
  </main>

  <script src="config.js"></script>
  <script src="data.js"></script>
  <script src="blog.js"></script>
  <script>
    (function (global) {
      var p = PORTFOLIO.profile;
      var S = PORTFOLIO.sections;
      var order = PORTFOLIO.order;

      // Identity
      document.getElementById('status').textContent = p.status;
      document.getElementById('firstname').textContent = p.name.split(' ')[0];
      document.getElementById('role').textContent = p.role;
      document.getElementById('tagline').textContent = p.tagline;
      document.getElementById('location').textContent = p.location;
      var em = document.getElementById('emaillink');
      em.textContent = p.email; em.href = 'mailto:' + p.email;

      // Tabs with hover flyout
      var tabsEl = document.getElementById('tabs');
      tabsEl.innerHTML = order.map(function (key) {
        var s = S[key];
        return '' +
          '<div class="tab">' +
            '<a href="detail.html?s=' + key + '" data-glance="' + key + '"><span class="tab-ico">' + s.icon + '</span>' + s.label + '</a>' +
          '</div>';
      }).join('');

      // Bento tiles
      var bentoEl = document.getElementById('bento');
      bentoEl.innerHTML = order.map(function (key) {
        var s = S[key];
        return '' +
          '<a class="tile" href="detail.html?s=' + key + '" data-glance="' + key + '" aria-label="Open ' + s.label + '">' +
            '<span class="tile-arrow">↗</span>' +
            '<span class="tile-ico">' + s.icon + '</span>' +
            '<div>' +
              '<h3>' + s.label + '</h3>' +
              '<p class="tile-tag">' + s.tagline + '</p>' +
            '</div>' +
            '<span class="tile-hint">Hover to preview · click to open</span>' +
          '</a>';
      }).join('');

      // Pull live blog posts (if a sheet is configured) and refresh the
      // Blog tile + glance so the home page reflects the latest thoughts.
      if (global.BlogSource) {
        global.BlogSource.fetchBlogs().then(function (posts) {
          if (!posts || !posts.length) return;
          var b = S.blog;
          b.preview = posts.slice(0, 3).map(function (p) { return p.title; });
          b.glance.summary = 'Latest thoughts, pulled live from my notes — ' +
            posts.length + ' post' + (posts.length > 1 ? 's' : '') + ' and counting.';
          b.glance.highlights = posts.slice(0, 4).map(function (p) {
            var t = (p.summary || '').trim();
            if (t.length > 120) t = t.slice(0, 117) + '…';
            return { h: p.title, t: t || (p.category ? p.category : 'New post') };
          });
        });
      }
    })(window);
  </script>
  <script src="glance.js"></script>
  <script src="theme.js"></script>
</body>
</html>
