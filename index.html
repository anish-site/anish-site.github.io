<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anish J — Portfolio</title>
  <meta name="description" content="Anish J — Product & Operations Leader, MBA candidate. Bio, résumé, education, jobs, projects and thoughts.">
  <link rel="icon" type="image/png" href="loading-bar.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="home">

  <!-- Top bar with hover-preview tabs -->
  <header class="topbar">
    <div class="wrap topbar-inner">
      <a class="brand" href="index.html">Anish<span class="dot">.</span>J</a>
      <nav class="tabs" id="tabs"><!-- rendered by JS --></nav>
      <div class="topbar-cta">
        <a class="btn btn-ghost btn-sm linkedin-btn" href="https://www.linkedin.com/in/anish-j-" target="_blank" rel="noopener">LinkedIn</a>
        <a class="btn btn-primary btn-sm" href="mailto:anishjoson@gmail.com">Contact</a>
      </div>
    </div>
  </header>

  <!-- Single-view stage -->
  <main class="stage">
    <div class="wrap stage-grid">

      <!-- Identity -->
      <section class="identity">
        <span class="eyebrow"><span class="pulse"></span> <span id="status"></span></span>
        <h1>Hi, I'm <span class="grad" id="firstname"></span></h1>
        <p class="role" id="role"></p>
        <p class="tagline" id="tagline"></p>
        <div class="meta">
          <span>📍 <span id="location"></span></span>
          <span>✉ <a id="emaillink" href="#"></a></span>
        </div>
        <div class="actions">
          <a class="btn btn-primary" href="detail.html?s=bio">Explore portfolio →</a>
          <a class="btn btn-ghost" href="detail.html?s=resume">View résumé</a>
        </div>
      </section>

      <!-- Bento grid of tiles -->
      <section class="bento" id="bento" aria-label="Portfolio sections"><!-- rendered by JS --></section>

    </div>
  </main>

  <script src="data.js"></script>
  <script>
    (function () {
      var p = PORTFOLIO.profile;
      var S = PORTFOLIO.sections;
      var order = PORTFOLIO.order;

      // Identity
      document.getElementById('status').textContent = p.status;
      document.getElementById('firstname').textContent = p.name.split(' ')[0];
      document.getElementById('role').textContent = p.role;
      document.getElementById('tagline').textContent = p.tagline;
      document.getElementById('location').textContent = p.location;
      var em = document.getElementById('emaillink');
      em.textContent = p.email; em.href = 'mailto:' + p.email;

      // Tabs with hover flyout
      var tabsEl = document.getElementById('tabs');
      tabsEl.innerHTML = order.map(function (key) {
        var s = S[key];
        var bullets = s.preview.map(function (b) { return '<li>' + b + '</li>'; }).join('');
        return '' +
          '<div class="tab">' +
            '<a href="detail.html?s=' + key + '"><span class="tab-ico">' + s.icon + '</span>' + s.label + '</a>' +
            '<div class="flyout">' +
              '<h4>' + s.label + '</h4>' +
              '<p class="fly-tag">' + s.tagline + '</p>' +
              '<ul>' + bullets + '</ul>' +
              '<span class="fly-open">Open ' + s.label + ' →</span>' +
            '</div>' +
          '</div>';
      }).join('');

      // Bento tiles
      var bentoEl = document.getElementById('bento');
      bentoEl.innerHTML = order.map(function (key) {
        var s = S[key];
        var bullets = s.preview.map(function (b) { return '<li>' + b + '</li>'; }).join('');
        return '' +
          '<a class="tile" href="detail.html?s=' + key + '" aria-label="Open ' + s.label + '">' +
            '<span class="tile-arrow">↗</span>' +
            '<span class="tile-ico">' + s.icon + '</span>' +
            '<div>' +
              '<h3>' + s.label + '</h3>' +
              '<p class="tile-tag">' + s.tagline + '</p>' +
            '</div>' +
            '<div class="tile-reveal">' +
              '<div class="rv-label">' + s.label + ' · at a glance</div>' +
              '<ul>' + bullets + '</ul>' +
              '<span class="rv-open">Open in detail →</span>' +
            '</div>' +
          '</a>';
      }).join('');
    })();
  </script>
</body>
</html>
