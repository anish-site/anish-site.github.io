name: Build RSS feed

on:
  push:
    branches: [main]
    paths:
      - 'posts/**'
      - 'scripts/build-rss.js'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Generate feed.xml
        run: node scripts/build-rss.js
      - name: Commit feed if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add feed.xml
          if git diff --staged --quiet; then
            echo "feed.xml unchanged."
          else
            git commit -m "chore: regenerate RSS feed [skip ci]"
            git push
          fi
